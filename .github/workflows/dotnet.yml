# This workflow will build a .NET project and create releases
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write  # Required for creating releases and tags

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for version tagging
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: |
          dotnet build --no-restore --configuration Release src/HardwareExporterWindows/HardwareExporterWindows.csproj
          dotnet build --no-restore --configuration Release test/HardwareExporterWindows.Tests/HardwareExporterWindows.Tests.csproj
          dotnet build --no-restore --configuration Release src/HardwareExporterWeb/HardwareExporterWeb.csproj
          dotnet build --no-restore --configuration Release test/HardwareExporterWeb.Tests/HardwareExporterWeb.Tests.csproj
    
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Publish HardwareExporterWindows
      run: |
          dotnet publish src/HardwareExporterWindows/HardwareExporterWindows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o bin/publish/HardwareExporterWindows
    
    - name: Publish HardwareExporterWeb
      run: |
          dotnet publish src/HardwareExporterWeb/HardwareExporterWeb.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o bin/publish/HardwareExporterWeb
    
    - name: Create Archives
      run: |
          Compress-Archive -Path bin/publish/HardwareExporterWindows/* -DestinationPath HardwareExporterWindows-win-x64.zip
          Compress-Archive -Path bin/publish/HardwareExporterWeb/* -DestinationPath HardwareExporterWeb-win-x64.zip
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          HardwareExporterWindows-win-x64.zip
          HardwareExporterWeb-win-x64.zip
        retention-days: 90
    
    - name: Generate Version Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: version
      run: |
          $timestamp = Get-Date -Format "yyyy.MM.dd.HHmm"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $version = "v$timestamp-$shortSha"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Generated version: $version"
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Automated Release
          
          **Commit:** ${{ github.sha }}
          **Author:** ${{ github.actor }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Changes
          ${{ github.event.head_commit.message }}
          
          ### Downloads
          - `HardwareExporterWindows-win-x64.zip` - Windows hardware exporter (standalone)
          - `HardwareExporterWeb-win-x64.zip` - Web interface (standalone)
          
          ### Installation
          1. Download the appropriate zip file
          2. Extract to your desired location
          3. Run `HardwareExporterWindows.exe` or `HardwareExporterWeb.exe`
          4. For Windows Service installation, run `install.ps1` as Administrator
        files: |
          HardwareExporterWindows-win-x64.zip
          HardwareExporterWeb-win-x64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
