# This workflow will build a .NET project and create releases
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write  # Required for creating releases and tags

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for version tagging
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: |
          dotnet build --no-restore --configuration Release src/HardwareExporterWindows/HardwareExporterWindows.csproj
          dotnet build --no-restore --configuration Release test/HardwareExporterWindows.Tests/HardwareExporterWindows.Tests.csproj
          dotnet build --no-restore --configuration Release src/HardwareExporterWeb/HardwareExporterWeb.csproj
          dotnet build --no-restore --configuration Release test/HardwareExporterWeb.Tests/HardwareExporterWeb.Tests.csproj
    
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Publish HardwareExporterWindows
      run: |
          dotnet publish src/HardwareExporterWindows/HardwareExporterWindows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o bin/publish/HardwareExporterWindows
    
    - name: Publish HardwareExporterWeb
      run: |
          dotnet publish src/HardwareExporterWeb/HardwareExporterWeb.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o bin/publish/HardwareExporterWeb-win-x64
    
    - name: Publish HardwareExporterWeb (Linux ARM64)
      run: |
          dotnet publish src/HardwareExporterWeb/HardwareExporterWeb.csproj `
            -c Release `
            -r linux-arm64 `
            --self-contained true `
            -o bin/publish/HardwareExporterWeb-linux-arm64
    
    - name: Create Archives
      run: |
          Compress-Archive -Path bin/publish/HardwareExporterWindows/* -DestinationPath HardwareExporterWindows-win-x64.zip
          Compress-Archive -Path bin/publish/HardwareExporterWeb-win-x64/* -DestinationPath HardwareExporterWeb-win-x64.zip
          
          # Create tar.gz for Linux ARM64
          cd bin/publish/HardwareExporterWeb-linux-arm64
          tar -czf ../../../HardwareExporterWeb-linux-arm64.tar.gz *
          cd ../../..
    
    - name: Setup WiX Toolset
      run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add -g WixToolset.UI.wixext/4.0.5
    
    - name: Build MSI Installer
      run: |
          # Create installer files directory
          New-Item -ItemType Directory -Path installer/files -Force | Out-Null
          
          # Copy published files to installer directory
          Copy-Item -Path bin/publish/HardwareExporterWindows/* -Destination installer/files/ -Recurse -Force
          
          # Build MSI using WiX
          cd installer
          wix build HardwareExporter.wxs -ext WixToolset.UI.wixext -out ../HardwareExporterWindows-win-x64.msi -d SourceDir=files
          cd ..
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: |
          HardwareExporterWindows-win-x64.zip
          HardwareExporterWindows-win-x64.msi
          HardwareExporterWeb-win-x64.zip
          HardwareExporterWeb-linux-arm64.tar.gz
        retention-days: 90
    
    - name: Generate Version Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: version
      run: |
          $timestamp = Get-Date -Format "yyyy.MM.dd.HHmm"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $version = "v$timestamp-$shortSha"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Generated version: $version"
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Automated Release
          
          **Commit:** ${{ github.sha }}
          **Author:** ${{ github.actor }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Changes
          ${{ github.event.head_commit.message }}
          
          ### Downloads
          - `HardwareExporterWindows-win-x64.msi` - **Windows Installer (Recommended)** - Automatic service installation
          - `HardwareExporterWindows-win-x64.zip` - Windows hardware exporter (standalone)
          - `HardwareExporterWeb-win-x64.zip` - Web interface for Windows (standalone)
          - `HardwareExporterWeb-linux-arm64.tar.gz` - Web interface for Linux ARM64 (standalone)
          
          ### Installation
          
          **Option 1: MSI Installer (Recommended)**
          1. Download `HardwareExporterWindows-win-x64.msi`
          2. Double-click to install
          3. The installer will automatically:
             - Copy files to `C:\Program Files\HardwareExporter`
             - Install and start the Windows Service
             - Configure firewall rules
          
          **Option 2: Manual Installation**
          1. Download the appropriate zip file
          2. Extract to your desired location
          3. Run `HardwareExporterWindows.exe` or `HardwareExporterWeb.exe`
          4. For Windows Service installation, run `install.ps1` as Administrator
        files: |
          HardwareExporterWindows-win-x64.msi
          HardwareExporterWindows-win-x64.zip
          HardwareExporterWeb-win-x64.zip
          HardwareExporterWeb-linux-arm64.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
